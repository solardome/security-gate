<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="520" height="140">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d18"/>
      <stop offset="100%" stop-color="#0c1628"/>
    </linearGradient>

    <linearGradient id="shieldFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#162d50"/>
      <stop offset="100%" stop-color="#0a1a32"/>
    </linearGradient>

    <linearGradient id="scanBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="40%" stop-color="#00d4ff" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#00d4ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>

    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="520" height="140" rx="8" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#00d4ff" stroke-width="0.4" opacity="0.06">
    <line x1="0" y1="35" x2="520" y2="35"/>
    <line x1="0" y1="70" x2="520" y2="70"/>
    <line x1="0" y1="105" x2="520" y2="105"/>
    <line x1="130" y1="0" x2="130" y2="140"/>
    <line x1="260" y1="0" x2="260" y2="140"/>
    <line x1="390" y1="0" x2="390" y2="140"/>
  </g>

  <!-- Corner brackets -->
  <g stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.4">
    <polyline points="5,18 5,5 18,5"/>
    <polyline points="502,5 515,5 515,18"/>
    <polyline points="5,122 5,135 18,135"/>
    <polyline points="502,135 515,135 515,122"/>
  </g>

  <!-- SHIELD outer glow ring -->
  <path d="M34,15 L84,15 L84,68 Q84,96 59,108 Q34,96 34,68 Z"
        fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>

  <!-- Shield body -->
  <path d="M38,19 L80,19 L80,68 Q80,92 59,103 Q38,92 38,68 Z"
        fill="url(#shieldFill)" stroke="#1c4272" stroke-width="1.5"/>

  <!-- Inner accent line -->
  <path d="M43,23 L75,23 L75,68 Q75,87 59,97 Q43,87 43,68 Z"
        fill="none" stroke="#00d4ff" stroke-width="0.6" opacity="0.25"/>

  <!-- Gate post left -->
  <rect x="46" y="38" width="3.5" height="28" rx="1.5" fill="#2a6090"/>
  <!-- Gate post right -->
  <rect x="68" y="38" width="3.5" height="28" rx="1.5" fill="#2a6090"/>
  <!-- Ground bar -->
  <rect x="44" y="64" width="30" height="2.5" rx="1" fill="#1e4d72" opacity="0.8"/>

  <!-- Gate arm raised = ALLOW -->
  <rect x="49.5" y="34" width="19" height="3" rx="1.5" fill="#00e676" filter="url(#subtleGlow)" opacity="0.95"/>

  <!-- Lock body -->
  <rect x="53" y="51" width="12" height="9" rx="2" fill="#1a5c9e" stroke="#2a7acf" stroke-width="0.8"/>
  <!-- Lock shackle -->
  <path d="M55.5,51 Q55.5,46 59,46 Q62.5,46 62.5,51" fill="none" stroke="#2a7acf" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="59" cy="56" r="1.5" fill="#00d4ff" opacity="0.7"/>

  <!-- WORDMARK: "security" lighter weight -->
  <text
    x="104" y="68"
    font-family="'Courier New', Courier, monospace"
    font-size="34"
    font-weight="400"
    letter-spacing="1"
    fill="#c8dff5"
  >security</text>

  <!-- Dash separator -->
  <text
    x="336" y="68"
    font-family="'Courier New', Courier, monospace"
    font-size="34"
    fill="#00d4ff"
    opacity="0.45"
  >- </text>

  <!-- "gate" bold cyan -->
  <text
    x="352" y="68"
    font-family="'Courier New', Courier, monospace"
    font-size="34"
    font-weight="700"
    letter-spacing="3"
    fill="#00d4ff"
    filter="url(#subtleGlow)"
  >gate</text>

  <!-- Thin rule under wordmark -->
  <line x1="104" y1="78" x2="460" y2="78" stroke="#00d4ff" stroke-width="0.6" opacity="0.18"/>

  <!-- STATUS PILLS -->
  <rect x="104" y="89" width="66" height="19" rx="4" fill="rgba(0,230,118,0.08)" stroke="#00e676" stroke-width="0.8"/>
  <text x="137" y="103" font-family="'Courier New', monospace" font-size="9.5" font-weight="700" fill="#00e676" text-anchor="middle" letter-spacing="1.5">ALLOW</text>

  <rect x="178" y="89" width="58" height="19" rx="4" fill="rgba(255,179,0,0.08)" stroke="#ffb300" stroke-width="0.8"/>
  <text x="207" y="103" font-family="'Courier New', monospace" font-size="9.5" font-weight="700" fill="#ffb300" text-anchor="middle" letter-spacing="1.5">WARN</text>

  <rect x="244" y="89" width="64" height="19" rx="4" fill="rgba(255,50,50,0.08)" stroke="#ff4444" stroke-width="0.8"/>
  <text x="276" y="103" font-family="'Courier New', monospace" font-size="9.5" font-weight="700" fill="#ff4444" text-anchor="middle" letter-spacing="1.5">BLOCK</text>

  <!-- Tagline -->
  <text x="104" y="125"
    font-family="'Courier New', monospace"
    font-size="8.5"
    fill="#4a7aaa"
    letter-spacing="0.8"
  >deterministic · stage-aware · privacy-first CI/CD gate</text>

  <!-- Animated scan line -->
  <rect x="0" y="0" width="520" height="1.5" rx="1" fill="url(#scanBar)">
    <animate attributeName="y" values="8;132;8" dur="5s" repeatCount="indefinite" calcMode="ease-in-out"/>
    <animate attributeName="opacity" values="0.5;0.15;0.5" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>
