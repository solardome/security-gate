name: 'Security Gate'
description: 'Run security-gate to produce a deterministic CI/CD gating decision from scanner reports'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  scan:
    description: 'Glob or comma-separated paths to scanner JSON files (required)'
    required: true
  baseline-scan:
    description: 'Glob or comma-separated paths to baseline scanner JSON files'
    required: false
    default: ''
  new-findings-only:
    description: 'Score only findings not present in baseline scans (pr/merge only)'
    required: false
    default: 'false'
  policy:
    description: 'Path to policy YAML'
    required: false
    default: '.security-gate/policy.yaml'
  accepted-risk:
    description: 'Path to accepted-risk YAML'
    required: false
    default: ''
  context:
    description: 'Path to context YAML. If omitted, uses --context-auto'
    required: false
    default: ''
  version:
    description: 'Pinned security-gate release tag to install (for example v1.0.0).'
    required: true
  fail-on-warn:
    description: 'If true, the action fails on WARN (exit 1) in addition to BLOCK (exit 2)'
    required: false
    default: 'false'
  evaluation-time:
    description: 'Optional RFC3339 evaluation time for deterministic replay'
    required: false
    default: ''

outputs:
  decision:
    description: 'Gate decision: ALLOW, WARN, or BLOCK'
    value: ${{ steps.run.outputs.decision }}
  exit-code:
    description: 'security-gate exit code (0, 1, or 2)'
    value: ${{ steps.run.outputs.exit_code }}
  risk-score:
    description: 'Overall risk score (0-100)'
    value: ${{ steps.run.outputs.risk_score }}
  trust-score:
    description: 'Trust score (0-100)'
    value: ${{ steps.run.outputs.trust_score }}
  report-json-path:
    description: 'Path to the generated report.json'
    value: ${{ steps.run.outputs.report_json_path }}
  report-html-path:
    description: 'Path to the generated report.html'
    value: ${{ steps.run.outputs.report_html_path }}

runs:
  using: 'composite'
  steps:
    - name: Determine version tag
      id: version
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        TAG="${INPUT_VERSION}"
        TAG="${TAG#"${TAG%%[![:space:]]*}"}"
        TAG="${TAG%"${TAG##*[![:space:]]}"}"
        if [ -z "${TAG}" ]; then
          echo "::error::inputs.version is required. Pin an explicit security-gate release tag."
          exit 1
        fi
        if [ "${TAG}" = "latest" ]; then
          echo "::error::inputs.version=latest is not allowed because it is non-deterministic."
          exit 1
        fi
        if [[ ! "${TAG}" =~ ^[A-Za-z0-9._+-]+$ ]]; then
          echo "::error::inputs.version must be a pinned release tag containing only letters, numbers, dot, underscore, plus, or hyphen."
          exit 1
        fi
        echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

    - name: Install security-gate
      shell: bash
      env:
        SECURITY_GATE_TAG: ${{ steps.version.outputs.tag }}
      run: |
        set -euo pipefail
        TAG="${SECURITY_GATE_TAG}"
        OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
        ARCH="$(uname -m)"
        case "$ARCH" in
          x86_64)  ARCH="amd64" ;;
          aarch64) ARCH="arm64" ;;
        esac
        ASSET="security-gate_${OS}_${ARCH}"
        BASE_URL="https://github.com/solardome/security-gate/releases/download/${TAG}"
        URL="${BASE_URL}/${ASSET}"
        BIN_DIR="${RUNNER_TEMP}/security-gate-bin"
        mkdir -p "${BIN_DIR}"
        echo "Downloading ${URL}"
        curl -fsSL -o "${BIN_DIR}/security-gate" "${URL}"
        curl -fsSL -o "${BIN_DIR}/SHA256SUMS" "${BASE_URL}/SHA256SUMS"
        EXPECTED="$(awk -v asset="${ASSET}" '$2 == asset {print $1}' "${BIN_DIR}/SHA256SUMS")"
        if [ -z "${EXPECTED}" ]; then
          echo "::error::SHA256SUMS does not contain ${ASSET}."
          exit 1
        fi
        if command -v sha256sum >/dev/null 2>&1; then
          ACTUAL="$(sha256sum "${BIN_DIR}/security-gate" | awk '{print $1}')"
        else
          ACTUAL="$(shasum -a 256 "${BIN_DIR}/security-gate" | awk '{print $1}')"
        fi
        if [ "${EXPECTED}" != "${ACTUAL}" ]; then
          echo "::error::Checksum verification failed for ${ASSET}."
          exit 1
        fi
        chmod +x "${BIN_DIR}/security-gate"

    - name: Run security-gate
      id: run
      shell: bash
      env:
        INPUT_SCAN: ${{ inputs.scan }}
        INPUT_BASELINE_SCAN: ${{ inputs.baseline-scan }}
        INPUT_NEW_FINDINGS_ONLY: ${{ inputs.new-findings-only }}
        INPUT_POLICY: ${{ inputs.policy }}
        INPUT_ACCEPTED_RISK: ${{ inputs.accepted-risk }}
        INPUT_CONTEXT: ${{ inputs.context }}
        INPUT_FAIL_ON_WARN: ${{ inputs.fail-on-warn }}
        INPUT_EVALUATION_TIME: ${{ inputs.evaluation-time }}
      run: |
        set -uo pipefail
        SG="${RUNNER_TEMP}/security-gate-bin/security-gate"
        REPORT_DIR="${RUNNER_TEMP}/security-gate-reports"
        mkdir -p "${REPORT_DIR}"

        trim() {
          local value="$1"
          value="${value#"${value%%[![:space:]]*}"}"
          value="${value%"${value##*[![:space:]]}"}"
          printf '%s' "${value}"
        }

        # Build --scan flags by expanding globs / comma-separated paths
        SCAN_ARGS=()
        IFS=',' read -ra SCAN_INPUTS <<< "${INPUT_SCAN}"
        for pattern in "${SCAN_INPUTS[@]}"; do
          pattern="$(trim "${pattern}")"
          [ -z "$pattern" ] && continue
          for f in $pattern; do
            [ -f "$f" ] && SCAN_ARGS+=(--scan "$f")
          done
        done

        if [ ${#SCAN_ARGS[@]} -eq 0 ]; then
          echo "::error::No scan files matched the pattern: ${INPUT_SCAN}"
          exit 2
        fi

        # Build --baseline-scan flags
        BASELINE_ARGS=()
        if [ -n "${INPUT_BASELINE_SCAN}" ]; then
          IFS=',' read -ra BASELINE_INPUTS <<< "${INPUT_BASELINE_SCAN}"
          for pattern in "${BASELINE_INPUTS[@]}"; do
            pattern="$(trim "${pattern}")"
            [ -z "$pattern" ] && continue
            for f in $pattern; do
              [ -f "$f" ] && BASELINE_ARGS+=(--baseline-scan "$f")
            done
          done
        fi

        # Build optional flags
        OPTIONAL_ARGS=()

        if [ "${INPUT_NEW_FINDINGS_ONLY}" = "true" ]; then
          OPTIONAL_ARGS+=(--new-findings-only)
        fi

        if [ -n "${INPUT_CONTEXT}" ]; then
          OPTIONAL_ARGS+=(--context "${INPUT_CONTEXT}")
        else
          OPTIONAL_ARGS+=(--context-auto)
        fi

        if [ -n "${INPUT_ACCEPTED_RISK}" ]; then
          OPTIONAL_ARGS+=(--accepted-risk "${INPUT_ACCEPTED_RISK}")
        fi

        if [ -n "${INPUT_EVALUATION_TIME}" ]; then
          OPTIONAL_ARGS+=(--evaluation-time "${INPUT_EVALUATION_TIME}")
        fi

        # Run security-gate
        set +e
        OUTPUT=$("${SG}" \
          "${SCAN_ARGS[@]}" \
          ${BASELINE_ARGS[@]+"${BASELINE_ARGS[@]}"} \
          --policy "${INPUT_POLICY}" \
          "${OPTIONAL_ARGS[@]}" \
          --out-json  "${REPORT_DIR}/report.json" \
          --out-html  "${REPORT_DIR}/report.html" \
          --checksums "${REPORT_DIR}/checksums.sha256" \
          --run-log   "${REPORT_DIR}/security-gate.run.log" \
          2>&1)
        EXIT_CODE=$?
        set -e

        echo "${OUTPUT}"

        # Parse stdout line: decision=ALLOW exit_code=0 overall_risk=25 trust=85 ...
        extract_output_field() {
          local key="$1"
          local fallback="$2"
          local line
          local token
          local -a tokens
          while IFS= read -r line; do
            read -ra tokens <<< "${line}"
            for token in "${tokens[@]}"; do
              case "${token}" in
                ${key}=*)
                  printf '%s\n' "${token#*=}"
                  return 0
                  ;;
              esac
            done
          done <<< "${OUTPUT}"
          printf '%s\n' "${fallback}"
        }

        DECISION="$(extract_output_field "decision" "UNKNOWN")"
        RISK="$(extract_output_field "overall_risk" "-1")"
        TRUST="$(extract_output_field "trust" "-1")"

        # Set outputs
        echo "decision=${DECISION}"           >> "$GITHUB_OUTPUT"
        echo "exit_code=${EXIT_CODE}"         >> "$GITHUB_OUTPUT"
        echo "risk_score=${RISK}"             >> "$GITHUB_OUTPUT"
        echo "trust_score=${TRUST}"           >> "$GITHUB_OUTPUT"
        echo "report_json_path=${REPORT_DIR}/report.json"  >> "$GITHUB_OUTPUT"
        echo "report_html_path=${REPORT_DIR}/report.html"  >> "$GITHUB_OUTPUT"

        # Write job summary
        if [ -f "${REPORT_DIR}/report.json" ]; then
          {
            echo "## Security Gate: ${DECISION}"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Decision | **${DECISION}** |"
            echo "| Risk Score | ${RISK}/100 |"
            echo "| Trust Score | ${TRUST}/100 |"
            echo "| Exit Code | ${EXIT_CODE} |"
          } >> "$GITHUB_STEP_SUMMARY"
        fi

        # Decide whether to fail the step
        if [ "${EXIT_CODE}" -eq 2 ]; then
          echo "::error::Security gate decision: BLOCK (exit code 2)"
          exit 2
        elif [ "${EXIT_CODE}" -eq 1 ]; then
          if [ "${INPUT_FAIL_ON_WARN}" = "true" ]; then
            echo "::warning::Security gate decision: WARN (exit code 1, fail-on-warn enabled)"
            exit 1
          else
            echo "::warning::Security gate decision: WARN (exit code 1, continuing)"
          fi
        elif [ "${EXIT_CODE}" -ne 0 ]; then
          echo "::error::Security gate failed unexpectedly (exit code ${EXIT_CODE})"
          exit "${EXIT_CODE}"
        fi

    - name: Upload reports
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: security-gate-reports
        path: |
          ${{ runner.temp }}/security-gate-reports/report.json
          ${{ runner.temp }}/security-gate-reports/report.html
          ${{ runner.temp }}/security-gate-reports/checksums.sha256
          ${{ runner.temp }}/security-gate-reports/security-gate.run.log
        if-no-files-found: ignore
        retention-days: 90
