name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25'

permissions:
  contents: read
  security-events: write  # CodeQL and SARIF uploads

jobs:
  metadata:
    name: Build Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Compute deterministic CI version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags >/dev/null 2>&1 || true
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [[ "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            LAST_TAG="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo 'v0.0.0')"
            COMMITS="$(git rev-list --count "${LAST_TAG}"..HEAD 2>/dev/null || echo '0')"
            VERSION="${LAST_TAG}-${COMMITS}-g${SHORT_SHA}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved CI version: ${VERSION}"

  # ── 1. Build & test ────────────────────────────────────────────
  build:
    name: Build & Test
    needs: [metadata]
    runs-on: ubuntu-latest
    env:
      CI_BUILD_VERSION: ${{ needs.metadata.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        run: |
          go build -trimpath -ldflags "-X main.version=${CI_BUILD_VERSION}" -o security-gate ./cmd/security-gate

      - name: Verify embedded version
        run: |
          ./security-gate -h 2>&1 | head -n 1 | grep -F "security-gate ${CI_BUILD_VERSION}"

      - name: Unit tests
        run: go test ./...

      - name: Race detector tests
        run: go test -race ./...

      - name: Simulation scenarios
        run: ./examples/simulation/simulate.sh

      - name: Upload binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: security-gate-linux-amd64
          path: security-gate
          retention-days: 1

  # ── 2. Static analysis ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      # golangci-lint pre-built binaries are compiled with an older Go toolchain
      # and reject Go 1.25 targets. Build from source with the same toolchain.
      - name: Install golangci-lint from source
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run ./...

  govulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          languages: go

      - name: Build
        run: go build ./cmd/security-gate

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1

  # ── 3. Security scans (produce JSON for gate + SARIF for GitHub Security tab) ──
  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Trivy scan → SARIF (GitHub Security tab)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy.sarif

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        if: always()
        with:
          sarif_file: trivy.sarif

      - name: Trivy scan → JSON (security-gate input)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy.json

      - name: Upload Trivy JSON
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: scan-trivy
          path: trivy.json
          retention-days: 1

  gosec:
    name: Gosec SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@223e19b8856e00f02cc67804499a83f77e208f3c # v2.25.0

      - name: Gosec scan → SARIF (GitHub Security tab + security-gate input)
        run: |
          "$(go env GOPATH)/bin/gosec" -no-fail -fmt sarif -out gosec.sarif ./...
          test -s gosec.sarif

      - name: Upload Gosec SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        if: always()
        with:
          sarif_file: gosec.sarif

      - name: Upload Gosec SARIF
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: scan-gosec
          path: gosec.sarif
          retention-days: 1

  # ── 4. Security gate ───────────────────────────────────────────
  # Runs security-gate on the real scan outputs above.
  # ALLOW/WARN → proceed. BLOCK → fail, no release.
  gate:
    name: Security Gate
    needs: [build, trivy, gosec]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: security-gate-linux-amd64

      - name: Download Trivy scan
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: scan-trivy

      - name: Download Gosec scan
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: scan-gosec

      - name: Run security-gate
        env:
          SECURITY_GATE_REPO_CRITICALITY: high
          SECURITY_GATE_EXPOSURE: internet
          SECURITY_GATE_CHANGE_TYPE: application
          SECURITY_GATE_SCANNER_NAME: trivy+gosec
          SECURITY_GATE_SCANNER_VERSION: trivy-v0.35.0+gosec-v2.25.0
          SECURITY_GATE_ARTIFACT_SIGNED: "no"
          SECURITY_GATE_PROVENANCE_LEVEL: unknown
          SECURITY_GATE_BUILD_CONTEXT_INTEGRITY: verified
        run: |
          set +e
          chmod +x ./security-gate
          ./security-gate \
            --scan trivy.json \
            --scan gosec.sarif \
            --context-auto \
            --policy .security-gate/policy.yaml \
            --out-json  gate-report.json \
            --out-html  gate-report.html \
            --checksums gate-checksums.sha256 \
            --run-log   gate.run.log
          EXIT_CODE=$?
          set -e

          case "${EXIT_CODE}" in
            0) echo "decision=ALLOW" ;;
            1) echo "::warning::Security gate decision: WARN — review report artifact" ;;
            2) echo "::error::Security gate decision: BLOCK — release will not proceed" ;;
          esac

          exit "${EXIT_CODE}"

      - name: Upload gate report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: security-gate-report
          path: |
            gate-report.json
            gate-report.html
            gate-checksums.sha256
            gate.run.log
          retention-days: 30
